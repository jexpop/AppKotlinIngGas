name: Weekly Supabase Backup

on:
  schedule:
    - cron: '0 2 * * 0'  # Cada domingo a las 2:00 AM
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo privado
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.REPO_BACKUP }}
          token: ${{ secrets.PAT }}
          path: backup-repo

      - name: Backup con pg_dump 17 (Docker)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          FILENAME="backup_$(date +%Y%m%d).sql"
          mkdir -p backup-repo/sql

          docker run --rm \
            -v $PWD/backup-repo/sql:/backup \
            -e SUPABASE_DB_URL="$SUPABASE_DB_URL" \
            postgres:17 \
            bash -c 'pg_dump "$SUPABASE_DB_URL" > /backup/$FILENAME'

          echo "Backup generado: $FILENAME"

      - name: Commit y push al repo privado
        run: |
          cd backup-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          mkdir -p sql
          git add .
          git diff --staged --quiet || git commit -m "Backup automático $(date +%Y-%m-%d)"
          git push
