name: Weekly Supabase Backup

on:
  schedule:
    - cron: '0 2 * * 0'   # Cada domingo a las 2:00 AM UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo privado
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.REPO_BACKUP }}
          token: ${{ secrets.PAT }}
          path: backup-repo

      - name: Instalar PostgreSQL Client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Comprobar versión de pg_dump
        run: |
          /usr/lib/postgresql/17/bin/pg_dump --version

      - name: Hacer backup de Supabase
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backup-repo/sql
          FILENAME="backup_$(date +%Y%m%d).sql"
          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL" > "backup-repo/sql/$FILENAME"
          echo "Backup generado: $FILENAME"

      - name: Commit y push al repo privado
        run: |
          cd backup-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add sql/

          if git diff --staged --quiet; then
            echo "No hay cambios para subir."
          else
            git commit -m "Backup automático $(date +%Y-%m-%d)"
            git push
          fi
