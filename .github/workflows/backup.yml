name: Weekly Supabase Backup

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo privado
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.REPO_BACKUP }}
          token: ${{ secrets.PAT }}
          path: backup-repo

      - name: Crear backup con PostgreSQL 17
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backup-repo/sql
          FILENAME="backup_$(date +%Y%m%d).sql"

          docker run --rm \
            -v "${{ github.workspace }}/backup-repo/sql:/backup" \
            postgres:17 \
            bash -c 'pg_dump "$SUPABASE_DB_URL" > /backup/'"$FILENAME"'' \
            -e SUPABASE_DB_URL="$SUPABASE_DB_URL"

          echo "Backup generado: $FILENAME"

      - name: Commit y push
        run: |
          cd backup-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add sql/

          if git diff --staged --quiet; then
            echo "No hay cambios."
          else
            git commit -m "Backup automático $(date +%Y-%m-%d)"
            git push
          fi
