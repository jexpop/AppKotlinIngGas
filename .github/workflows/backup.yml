name: Weekly Supabase Backup

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo privado
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.USERNAME }}/${{ secrets.REPO_BACKUP }}
          token: ${{ secrets.PAT }}
          path: backup-repo

      - name: Comprobar Docker
        run: |
          docker --version
          docker info

      - name: Commit y push al repo privado
        run: |
          echo "Prueba"
