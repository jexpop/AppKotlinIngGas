name: Weekly Supabase Backup

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Generar backup SQL con Docker
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          FILENAME="backup_$(date +%Y%m%d).sql"
          
          docker run --rm \
            -v $PWD:/backup \
            -e SUPABASE_DB_URL="$SUPABASE_DB_URL" \
            postgres:17 \
            bash -c 'pg_dump "$SUPABASE_DB_URL" > /backup/backup.sql'

          echo "Backup SQL generado: backup.sql"

      - name: Cifrar y subir a Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ENCRYPTION_PASSWORD: ${{ secrets.ENCRYPTION_PASSWORD }}
        run: |
          pip3 install cryptography supabase --quiet

          python3 << 'EOF'
          import os
          import secrets as sec
          from cryptography.hazmat.primitives.kdf.pbkdf2 import PBKDF2HMAC
          from cryptography.hazmat.primitives import hashes
          from cryptography.hazmat.primitives.ciphers.aead import AESGCM
          from supabase import create_client
          from datetime import datetime

          # Derivar clave
          password = os.environ['ENCRYPTION_PASSWORD'].encode()
          salt = b'ecogar_salt_v1'
          kdf = PBKDF2HMAC(algorithm=hashes.SHA256(), length=32, salt=salt, iterations=100000)
          key = kdf.derive(password)

          # Leer backup SQL
          with open('backup.sql', 'rb') as f:
              data = f.read()

          # Cifrado AES-GCM
          iv = sec.token_bytes(12)
          aesgcm = AESGCM(key)
          encrypted = iv + aesgcm.encrypt(iv, data, None)

          # Subir a Supabase Storage
          filename = f"backup_{datetime.now().strftime('%Y%m%d')}.sql.enc"
          client = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_SERVICE_KEY'])
          path = f"sql/{filename}"
          client.storage.from_('backups').upload(path, encrypted, {"upsert": "true"})
          print(f"Backup cifrado subido: {path}")

          # Limpiar
          os.remove('backup.sql')
          print("Fichero temporal eliminado")
          EOF
